    <template id="catalogTemplate">
      <section class="catalog-layout">
        <div class="catalog-overview" id="catalogOverview"></div>
        <div class="filter-panel">
          <label class="search-box">
            <span class="icon icon-search" aria-hidden="true"></span>
            <input
              id="courseSearch"
              type="search"
              placeholder="Search courses"
            />
          </label>
          <div class="filter-row" id="subjectFilters"></div>
        </div>
        <div class="advanced-filters">
          <select id="difficultyFilter" aria-label="Difficulty filter">
            <option value="All">All difficulties</option>
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Advanced">Advanced</option>
          </select>
          <select id="durationFilter" aria-label="Duration filter">
            <option value="All">Any duration</option>
            <option value="short">Short under 20 min</option>
            <option value="medium">Medium 20-45 min</option>
            <option value="long">Long 45+ min</option>
          </select>
          <select id="sortFilter" aria-label="Sort courses">
            <option value="recommended">Recommended</option>
            <option value="rating">Highest rated</option>
            <option value="progress">In progress</option>
            <option value="newest">Newest</option>
          </select>
        </div>
        <div class="recommendation-panel" id="recommendationPanel"></div>
        <div class="course-grid" id="courseGrid"></div>
      </section>
    </template>

    <template id="studioTemplate">

                Subject

            </div>
            <label>
              Course description

A short path for building a daily learning habit that is easy to repeat.</textarea
              >

                    id="addLevelButton"

                    Level

                  <button

                    id="addLessonButton"
                    type="button"

                    Lesson
                  </button>

                <div class="structure-list" id="levelList"></div>
                <div class="structure-list" id="lessonList"></div>
              </div>
              <div class="split-fields">
                <label>
                  Selected level title
                  <input id="selectedLevelTitle" type="text" />
                </label>
                <label>
                  Selected lesson title
                  <input id="selectedLessonTitle" type="text" />
                </label>
              </div>
              <div class="split-fields">
                <label>
                  Lesson minutes
                  <input
                    id="selectedLessonMinutes"
                    type="number"
                    min="1"
                    max="90"
                  />
                </label>
                <div class="builder-toolbar">
                  <button
                    class="danger-button"
                    id="removeLevelButton"
                    type="button"
                  >
                    Remove level
                  </button>
                  <button
                    class="danger-button"
                    id="removeLessonButton"
                    type="button"
                  >
                    Remove lesson
                  </button>
                </div>
              </div>
            </div>

            <div class="builder-header">
              <div>
                <p class="eyebrow">Lesson blocks</p>

                  Text

                <button class="ghost-button" id="addQuizBlock" type="button">
                  Quiz
                </button>
                <button

                  id="addReflectionBlock"
                  type="button"

                  Reflection
                </button>
                <button class="ghost-button" id="addImageBlock" type="button">
                  Image
                </button>
                <button class="ghost-button" id="addVideoBlock" type="button">
                  Video

              <button class="ghost-button" id="saveDraftButton" type="button">
                Save draft

              <button class="danger-button" id="resetDraftButton" type="button">
                Reset draft
              </button>
              <button class="primary-button" type="submit">

                Submit

        <div class="review-panel" id="reviewPanel"></div>
      </section>

    <template id="classroomTemplate">

    <template id="settingsTemplate">
